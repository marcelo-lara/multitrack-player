services:
  app:
    build:
      context: .
      target: development
    command: npm run serve -- --host 0.0.0.0 --port 8080
    environment:
      CHOKIDAR_USEPOLLING: "true"
      HOST: 0.0.0.0
      NODE_ENV: development
      PORT: "8080"
      WATCHPACK_POLLING: "true"
    ports:
      - "8080:8080"
    stdin_open: true
    tty: true
    volumes:
      - .:/app
      - node_modules:/app/node_modules

  app-prod:
    build:
      context: .
      target: production
    profiles:
      - prod
    ports:
      - "8081:80"

volumes:
  node_modules: